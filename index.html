<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adriano Júnior | Portfólio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="container">
  <header class="container">
    <h1>Adriano Júnior</h1>
    <p>Estudante de Programação | DevOps</p>
    <p><a href="mailto:adrianojunr@gmail.com">adrianojunr@gmail.com</a></p>
  </header>

  <main class="container">
    <section>
      <h2 class="section-title">Projetos</h2>
      <div class="row" id="projects">
        <!-- Os projetos serão inseridos aqui via JavaScript -->
      </div>
    </section>

    <!-- Contato -->
    <section>
      <h2 class="section-title">Contato</h2>
      <p>Email: <a href="mailto:adrianojunr@gmail.com">adrianojunr@gmail.com</a></p>
      <p>GitHub: <a href="https://github.com/devJunr" target="_blank">github.com/devJunr</a></p>
    </section>
  </main>
  <script>
    // Função para buscar e exibir os repositórios do GitHub
    fetch('https://api.github.com/users/devJunr/repos')
      .then(response => response.json())
      .then(repos => {
        const projectsContainer = document.getElementById('projects');
        repos.forEach(repo => {
          const col = document.createElement('div');
          col.className = 'col-md-4 project-card';
          col.innerHTML = `
            <div class="card h-100">
              <div class="card-body">
                <h5 class="card-title">${repo.name}</h5>
                <p class="card-text">${repo.description || ' '}</p>
                <a href="${repo.html_url}" class="btn btn-outline-dark" target="_blank">Ver Projeto</a>
              </div>
            </div>
          `;
          projectsContainer.appendChild(col);
        });
      })
      .catch(error => {
        console.error('Erro ao buscar repositórios:', error);
      });
  </script>

</body>
</html>
