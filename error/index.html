<body>
    <header class="cabecalho">
        <section class="cabecalho__titulo">
            <h1 class="cabecalho__titulo__h1" id="titulo_cabecario">ERRO</h1>
        </section>
        <nav class="cabecalho__opcoes">
            <a onclick="irInicio()" class="cabecalho__opcoes_btn" href="../index.html">Inicio</a>
        </nav>

    <main class="conteudo">
        <section class="error-mensagem-alerta">
            <div id="mensagem"></div>
        </section>
            
    </main>

    <footer class="rodape">
        <h4 class="rodape__copy">Copyright © 2024 - Adriano</h4>
        <h6>V.2</h6>
    </footer>


    <script>
        // Função para obter o valor do parâmetro da URL
        function getParameterByName(name) {
            const url = window.location.href;
            name = name.replace(/[$$$$]/g, '\\$&');
            const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
                results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

        // Obtém o valor do parâmetro 'error'
        const errorCode = getParameterByName('error');

        // Exibe a mensagem na página, se o código de erro existir
        if (errorCode) {
            document.getElementById('mensagem').innerText = `Erro: ${errorCode}`;
        } else {
            document.getElementById('mensagem').innerText = 'Um erro foi encontrado, porém, nenhum código foi repassado';
        }
    </script>

</body>
