<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev. Adriano</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="stylesheet" href="../../styles/contato.css">
    <script src="../../scripts/script.js" defer></script>
    <meta name="description"
        content="Adriano: Um repositório de testes e códigos em diversas linguagens de programação, incluindo JavaScript, CSS, Java e HTML, para ajudar novos programadores.">
    <meta name="keywords"
        content="programação, desafios, JavaScript, CSS, Java, HTML, códigos, testes, novos programadores, Adriano Júnior,Adriano Júnior Desenvolvedor, Adriano Júnior Programador">
    <meta name="author" content="Adriano">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#00ff0a">
    <link rel="icon" href="../../assets/logo/ico.png" type="image/png">
</head>

<body>
    <header class="cabecalho">
        <section class="cabecalho__titulo">
            <h1 class="cabecalho__titulo__h1" id="titulo_cabecario">Adriano / Contato</h1>
        </section>
        <nav class="cabecalho__opcoes">
            <a onclick="irInicio()" class="cabecalho__opcoes_btn" href="../index.html">Inicio</a>
        </nav>
    </header>

    <main class="conteudo">
        <h4>Contato</h4>
        <section class="campo_contato">
            <form action="" method="get">
                <div class="campo_contato__alinhamento">
                    <table>
                        <tr>
                            <td><input type="text" name="nome" placeholder="Nome" required></td>
                            <td><input type="email" name="email" placeholder="Email" required></td>
                        </tr>
                        <tr>
                            <td><input type="number" name="telefone" placeholder="Telefone (opcional)"></td>
                            <td><input type="text" name="assunto" placeholder="Assunto" required></td>
                        </tr>
                        <tr>
                            <td><select id="tipo_consulta" name="tipo_consulta" required>
                                    <option value="">Suporte</option>
                                    <option value="">Recomendação</option>
                                    <option value="">Solicitação</option>
                                    <option value="">Relatar erro ou algo semelhante</option>
                                    <option value="">Outros</option>
                                </select></td>
                            <td><button type="submit" class="botao__enviar">Enviar contato</button></td>

                        </tr>
                    </table>
                </div>
            </form>
        </section>
    </main>
    <footer class="rodape">
        <h4 class="rodape__copy">Copyright © 2024 - Adriano</h4>
        <h6>V.2</h6>
    </footer>
</body>

</html>
