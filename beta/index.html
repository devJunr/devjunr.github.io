<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-up com Desfoque de Fundo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo básico da página */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* Container para o conteúdo */
.conteudo {
    padding: 20px;
    transition: filter 0.3s; /* Transição suave para o desfoque */
}

/* Classe para aplicar o desfoque */
.conteudo.blurred {
    filter: blur(5px); /* Aplica o desfoque */
}

/* Estilo básico do pop-up */
#meuPopup {
    position: fixed;
    bottom: 20px; /* Alinhado na parte inferior */
    left: 20px; /* Alinhado na parte esquerda */
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
    z-index: 1000; /* Garante que o pop-up esteja acima de todo o conteúdo */
    display: none; /* Escondido por padrão */
}

#meuPopup button {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
}

#meuPopup button:hover {
    background-color: #45a049;
}

/* Fundo escurecido (opcional) */
#fundoEscuro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5); /* Cor de fundo escura com opacidade */
    z-index: 999; /* Colocado logo abaixo do pop-up */
    display: none;
}

    </style>
</head>
<body>

    <!-- Fundo escurecido -->
    <div id="fundoEscuro"></div>

    <!-- Conteúdo principal da página -->
    <div class="conteudo">
        <h1>Minha Página</h1>
        <p>Este é o conteúdo da página que será desfocado quando o pop-up estiver visível.</p>
    </div>

    <!-- Estrutura do Pop-up -->
    <div id="meuPopup">
        <p>Bem-vindo ao site! Este é o seu pop-up.</p>
        <button onclick="fecharPopup()">Fechar</button>
    </div>

    <script>
        function exibirPopup() {
            document.getElementById('meuPopup').style.display = 'block';
            document.getElementById('fundoEscuro').style.display = 'block';
            document.querySelector('.conteudo').classList.add('blurred'); // Aplica o desfoque ao conteúdo
        }

        function fecharPopup() {
            document.getElementById('meuPopup').style.display = 'none';
            document.getElementById('fundoEscuro').style.display = 'none';
            document.querySelector('.conteudo').classList.remove('blurred'); // Remove o desfoque do conteúdo
        }

        window.onload = function() {
            setTimeout(exibirPopup, 2000); // Exibe o pop-up após 2 segundos
        }
    </script>

</body>
</html>
